services:
  orbit-siigo:
    build: .
    restart: unless-stopped
    env_file: .env
    expose:
      - "3000"
    volumes:
      - orbit_data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  orbit_data:
